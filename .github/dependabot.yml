# Brave Omega Project — Dependabot Configuration
# Keeps GitHub Actions and ecosystem dependencies up-to-date.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Istanbul"
    labels:
      - "automation"
      - "chore"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 5

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Istanbul"
    labels:
      - "automation"
      - "chore"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 3
