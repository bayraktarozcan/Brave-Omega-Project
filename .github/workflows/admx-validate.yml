name: ADMX Policy Validation

on:
  push:
    branches: [main]
    paths:
      - 'BraveOmega/BraveOmega-*.ps1'
      - 'admx/*'
  pull_request:
    branches: [main]
    paths:
      - 'BraveOmega/BraveOmega-*.ps1'
      - 'admx/*'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate ADMX policy cross-reference
        shell: pwsh
        run: ./admx/admx-validate.ps1

      - name: Check for Brave ADMX updates
        shell: pwsh
        run: |
          $versionFile = "admx/VERSION_BRAVE_ADMX"
          $oldVersion = ""
          if (Test-Path -LiteralPath $versionFile) {
            $oldVersion = (Get-Content -LiteralPath $versionFile -Raw).Trim()
          }
          try {
            $result = Invoke-WebRequest -Uri "https://brave-browser-downloads.s3.brave.com/latest/policy_templates.zip" -Method Head -UseBasicParsing
            $newEtag = $result.Headers["ETag"]
            $newLastMod = $result.Headers["Last-Modified"]
            Write-Host "Current ADMX version: $oldVersion"
            Write-Host "Remote ADMX ETag: $newEtag"
            Write-Host "Remote ADMX Last-Modified: $newLastMod"
          } catch {
            Write-Host "Could not reach Brave S3 to check for updates — skipping"
          }
