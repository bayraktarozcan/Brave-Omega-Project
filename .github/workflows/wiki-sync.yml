name: "Wiki Sync"

on:
  push:
    branches: [main]
    paths: ["Wiki/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Sync to Wiki repo
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_SYNC_TOKEN }}
        run: |
          unset GIT_DIR GIT_WORK_TREE GIT_INDEX_FILE GIT_OBJECT_DIRECTORY GIT_ALTERNATE_OBJECT_DIRECTORIES
          tmp=$(mktemp -d)
          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/bayraktarozcan/Brave-Omega-Project.wiki.git" "$tmp"
          rsync -a --delete "Wiki/" "$tmp/"
          cd "$tmp"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "sync: update Wiki from main (${{ github.sha }})"
            git push
          fi
