name: "Wiki Sync"

on:
  push:
    branches: [main]
    paths: ["Wiki/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Clone, sync, and push Wiki
        env:
          WIKI_URL: "https://x-access-token:${{ secrets.WIKI_SYNC_TOKEN }}@github.com/bayraktarozcan/Brave-Omega-Project.wiki.git"
        run: |
          set -e
          git clone "$WIKI_URL" wiki-repo
          cd wiki-repo
          git config core.autocrlf false
          rsync -a --delete ../Wiki/ ./
          find . -name '*.md' -exec sed -i 's/\xEF\xBB\xBF//g' {} +
          find . -name '*.md' -exec sed -i 's/\r$//' {} +
          echo "*.md text eol=lf" > .gitattributes
          git config user.name "bayraktarozcan"
          git config user.email "bayraktarozcan@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "sync: update Wiki from main (${{ github.sha }})"
            git push origin master
            echo "Wiki synced successfully"
          else
            echo "No changes detected — wiki already in sync"
          fi
