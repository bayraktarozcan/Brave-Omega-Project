name: "Wiki Sync"

on:
  push:
    branches: [main]
    paths: ["Wiki/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/checkout@v7
        with:
          repository: bayraktarozcan/Brave-Omega-Project.wiki
          token: ${{ secrets.WIKI_SYNC_TOKEN }}
          path: wiki-tmp
      - name: Sync to Wiki repo
        run: |
          rsync -a --delete "Wiki/" "wiki-tmp/"
          cd wiki-tmp
          git config user.name "bayraktarozcan"
          git config user.email "bayraktarozcan@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "sync: update Wiki from main (${{ github.sha }})"
            git push
          fi
