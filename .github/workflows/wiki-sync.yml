name: "Wiki Sync"

on:
  push:
    branches: [main]
    paths: ["Wiki/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate secret
        env:
          WIKI_SYNC_TOKEN: ${{ secrets.WIKI_SYNC_TOKEN }}
        run: |
          if [ -z "$WIKI_SYNC_TOKEN" ]; then
            echo "ERROR: WIKI_SYNC_TOKEN secret is not set. Skipping wiki sync."
            exit 1
          fi
      - name: Clone, sync, and push Wiki
        env:
          WIKI_URL: "https://x-access-token:${{ secrets.WIKI_SYNC_TOKEN }}@github.com/bayraktarozcan/Brave-Omega-Project.wiki.git"
        run: |
          set -ex
          WIKI_DIR="/tmp/wiki-repo"
          rm -rf "$WIKI_DIR"
          git clone "$WIKI_URL" "$WIKI_DIR"
          cd "$WIKI_DIR"
          git config core.autocrlf false
          git config user.name "bayraktarozcan"
          git config user.email "bayraktarozcan@users.noreply.github.com"
          rsync -a --delete --exclude='.git' --exclude='.gitattributes' "$GITHUB_WORKSPACE/Wiki/" "$WIKI_DIR/"
          find "$WIKI_DIR" -name '*.md' -exec sed -i 's/\xEF\xBB\xBF//g' {} +
          find "$WIKI_DIR" -name '*.md' -exec sed -i 's/\r$//' {} +
          echo "*.md text eol=lf" > "$WIKI_DIR/.gitattributes"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "sync: update Wiki from main (${{ github.sha }})"
            git push origin master
            echo "Wiki synced successfully"
          else
            echo "No changes detected — wiki already in sync"
          fi
