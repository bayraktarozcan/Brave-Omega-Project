# Brave Omega Project — Stale Issue & PR Management
# Marks inactive issues/PRs and closes stale items after a grace period.

name: "Stale"

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 90
          days-before-issue-close: 30
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 30 days if no further activity occurs.
            If this issue is still relevant, please comment to keep it open.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Feel free to reopen if it remains relevant.
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further activity occurs.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
          exempt-issue-labels: "security,pinned,enhancement,help wanted"
          exempt-pr-labels: "security,pinned,dependencies"
          operations-per-run: 50
