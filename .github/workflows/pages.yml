# Brave Omega Project — GitHub Pages deployment
# Deploys the static site from the repository root.

name: "Pages"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp index.html _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: "_site"
      - id: deployment
        uses: actions/deploy-pages@v5
        env:
          NODE_OPTIONS: "--no-deprecation"
